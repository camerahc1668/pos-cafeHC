name: 📱 Build APK + IPA (All Platforms)

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

env:
  APP_NAME: "POS Cafe 206"
  APP_ID: "com.cafe.pos206"

jobs:
  # ╔══════════════════════════════════════╗
  # ║         ANDROID APK BUILD            ║
  # ╚══════════════════════════════════════╝
  android:
    name: 🤖 Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: |
          npx cap add android 2>/dev/null || echo "platform exists"
          npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -q

      - name: Sign & Build Release APK
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: android
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS }}
          KS_KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KS_B64" | base64 -d > app/release.keystore
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KS_PASS \
            -Pandroid.injected.signing.key.alias=$KS_ALIAS \
            -Pandroid.injected.signing.key.password=$KS_KEY_PASS \
            --no-daemon -q

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: ignore
          retention-days: 30

  # ╔══════════════════════════════════════╗
  # ║           iOS IPA BUILD              ║
  # ╚══════════════════════════════════════╝
  ios:
    name: 🍎 iOS IPA
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Add iOS platform
        run: |
          npx cap add ios 2>/dev/null || echo "platform exists"
          npx cap sync ios

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/App/Pods
          key: pods-${{ hashFiles('ios/App/Podfile.lock') }}

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install

      - name: Build for Simulator (no signing)
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | grep -E '(error:|warning:|Build succeeded|FAILED)' | tail -20
        continue-on-error: true

      - name: Archive for Device (with signing)
        if: startsWith(github.ref, 'refs/tags/') && env.IOS_CERT != ''
        env:
          IOS_CERT: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERT_PASS: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROFILE: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_BUNDLE_ID: ${{ env.APP_ID }}
        working-directory: ios/App
        run: |
          # Setup keychain
          security create-keychain -p ci build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci build.keychain
          echo "$IOS_CERT" | base64 -d > cert.p12
          security import cert.p12 -k build.keychain -P "$IOS_CERT_PASS" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k ci build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROFILE" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision
          
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath /tmp/App.xcarchive \
            -destination "generic/platform=iOS"
          
          xcodebuild -exportArchive \
            -archivePath /tmp/App.xcarchive \
            -exportPath /tmp/ipa \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: /tmp/ipa/*.ipa
          if-no-files-found: ignore
          retention-days: 30

  # ╔══════════════════════════════════════╗
  # ║          CREATE RELEASE              ║
  # ╚══════════════════════════════════════╝
  release:
    name: 🚀 GitHub Release
    needs: [android, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "☕ POS Cafe ${{ github.ref_name }}"
          body: |
            ## ☕ POS Quán Cafe - Phiên bản ${{ github.ref_name }}
            
            ### 📱 Tải về
            | File | Mô tả |
            |------|-------|
            | `app-release.apk` | Android - Bản chính thức (khuyên dùng) |
            | `app-debug.apk` | Android - Bản debug để test |
            | `*.ipa` | iOS - Cần Apple Developer Account |
            
            ### 🤖 Cài APK trên Android
            1. Tải `app-release.apk`
            2. **Settings → Security → Install Unknown Apps** → Cho phép
            3. Mở file APK → Install
            
            ### 🍎 Cài IPA trên iOS  
            > Yêu cầu Apple Developer Account ($99/năm) hoặc dùng AltStore
            1. Tải `*.ipa`
            2. Dùng AltStore hoặc TestFlight để cài
            
            ### ✨ Tính năng
            - 🪑 Quản lý bàn & Order
            - ☕ Menu đồ uống đầy đủ  
            - 💰 Thu ngân & in hóa đơn
            - 📊 Báo cáo doanh thu
            - 🔥 Đồng bộ Firebase
            - 🖨️ In nhiệt Bluetooth
          files: |
            dist/**/*.apk
            dist/**/*.ipa
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
